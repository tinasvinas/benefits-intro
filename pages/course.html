<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>课程管理 · 初发 Trufar</title>
<link rel="stylesheet" href="../assets/shared.css">
<style>
.course-tip{background:#fff;border:1px solid #dce5ee;border-left:3px solid #779abe;padding:9px 12px;border-radius:5px;margin-bottom:12px;font-size:11px;color:#536b84}
.course-row-status{display:inline-flex;align-items:center;gap:6px;font-size:11px}.course-row-status::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}.cs-active{color:var(--success)}.cs-inactive{color:#94a3b8}
.training-config{font-size:10px;line-height:1.6}.training-config b{color:#42576d}
.publish-destination{font-size:10px;color:var(--text-mute);margin-top:4px}.publish-setting{padding:10px 12px;background:#f7f9fb;border:1px solid var(--border);border-radius:5px}.publish-setting.is-disabled{opacity:.55}.publish-options{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:8px}.publish-option{display:flex;gap:8px;align-items:flex-start;padding:9px;border:1px solid var(--border);border-radius:5px;background:#fff;cursor:pointer}.publish-option:has(input:checked){border-color:#7fa8c8;background:#f4f9fd}.publish-option b{display:block;font-size:11px;color:#36516a}.publish-option small{display:block;margin-top:3px;color:var(--text-mute);font-size:10px;line-height:1.45}
</style>
</head>
<body>
<aside id="sidebar"></aside>
<main id="main"><header id="topbar"></header><div id="content">
  <div class="course-tip"><b>课程是班级的前置依赖：</b>实训课程可进入「课程设计」配置章、小节、任务、课件、资源与提交物。</div>
  <div class="filter-bar">
    <div class="filter-item"><label>课程编号</label><input id="filter-code" class="form-control" placeholder="如 CS101"></div>
    <div class="filter-item"><label>课程名称</label><input id="filter-name" class="form-control" placeholder="模糊搜索"></div>
    <div class="filter-item"><label>开课学院</label><select id="filter-college" class="form-control"><option value="">全部</option><option>计算机学院</option><option>软件学院</option></select></div>
    <div class="filter-item"><label>状态</label><select id="filter-status" class="form-control"><option value="">全部</option><option>启用</option><option>停用</option></select></div>
    <div class="filter-item"><label>实训属性</label><select id="filter-training" class="form-control"><option value="">全部</option><option value="yes">实训课程</option><option value="no">普通课程</option></select></div>
    <div class="filter-item"><label>展示类型</label><select id="filter-publish-type" class="form-control"><option value="">全部</option><option value="official">官方实训课程</option><option value="public">公开课</option><option value="internal">我的实训课</option><option value="none">不展示</option></select></div>
    <div class="filter-actions"><button class="btn btn-outline" onclick="resetFilters()">重置</button><button class="btn btn-primary" onclick="queryCourses()">查询</button></div>
  </div>
  <div class="card">
    <div class="card-header"><div><div class="card-title">课程列表</div><div class="card-sub" id="course-count">共 8 门课程 · 实训课程 3</div></div><div class="flex gap-8"><button class="btn btn-outline" onclick="toast('已打开批量导入 Demo','info')">批量导入</button><button class="btn btn-primary" onclick="openCourseModal('create')">+ 新增课程</button></div></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>课程编号</th><th>课程名称</th><th>开课学院</th><th>学分</th><th>课程类型</th><th>展示类型</th><th>实训配置</th><th>已建班级</th><th>状态</th><th>更新时间</th><th>操作</th></tr></thead><tbody id="course-body"></tbody></table></div>
  </div>
</div></main>
<div class="modal-overlay" id="m-course"><div class="modal lg">
  <div class="modal-header"><h3 id="course-modal-title">新增课程</h3><button class="modal-close" data-close-modal>×</button></div>
  <div class="modal-body">
    <div class="form-row"><div class="form-group"><label><span class="req">*</span>课程编号</label><input id="course-code" class="form-control" placeholder="如 CS101，全校唯一"><div class="form-hint">字母+数字组合，不可重复</div></div><div class="form-group"><label><span class="req">*</span>课程名称</label><input id="course-name" class="form-control" maxlength="80" placeholder="≤80 字"></div></div>
    <div class="form-row"><div class="form-group"><label><span class="req">*</span>开课学院</label><select id="course-college" class="form-control"><option value="">请选择</option><option>计算机学院</option><option>软件学院</option><option>电信学院</option></select></div><div class="form-group"><label>学分</label><input class="form-control" type="number" step="0.5" placeholder="如 3.0"></div></div>
    <div class="form-row"><div class="form-group"><label>课程类型</label><select class="form-control"><option>专业必修</option><option>专业选修</option><option>公共必修</option></select></div><div class="form-group"><label>课时</label><input class="form-control" type="number" placeholder="如 48"></div></div>
    <div class="form-group"><label>课程简介</label><textarea class="form-control" maxlength="500"></textarea></div>
    <div class="form-group"><label>实训属性</label><div class="flex gap-10" style="align-items:center;padding:6px 0"><label class="toggle"><input id="course-training" type="checkbox" onchange="togglePublishSetting()"><span class="slider"></span></label><span class="form-hint" style="margin:0">打开后可在课程设计中配置章、小节、任务、课件、资源和提交物。</span></div></div>
    <div class="form-group publish-setting" id="publish-setting"><label>展示类型</label><div class="publish-options"><label class="publish-option"><input type="radio" name="course-publish-type" value="internal" checked><span><b>我的实训课</b><small>通过班级绑定后，在学生“我的实训课”中展示</small></span></label><label class="publish-option"><input type="radio" name="course-publish-type" value="official"><span><b>官方实训课程</b><small>发布到“课程中心”的官方实训课程</small></span></label><label class="publish-option"><input type="radio" name="course-publish-type" value="public"><span><b>公开课</b><small>发布到“我的实训－公开课”，无需加入班级即可学习</small></span></label></div><div class="form-hint" id="publish-destination-hint">当前课程将通过班级绑定展示在“我的实训课”。</div></div>
  </div>
  <div class="modal-footer"><button class="btn btn-outline" data-close-modal>取消</button><button class="btn btn-primary" onclick="saveCourse()">确定</button></div>
</div></div>
<script>
const PAGE_CONFIG={activeNav:'course',title:'课程管理',breadcrumb:['教学管理','课程管理']};
const COURSES=[
 {code:'CS101',name:'C语言程序设计',college:'计算机学院',credit:'3.0',type:'专业必修',training:true,publishType:'official',config:'5 / 8 / 4',ready:true,classes:3,status:'启用',updated:'2026-07-12'},
 {code:'CS201',name:'数据结构',college:'计算机学院',credit:'4.0',type:'专业必修',training:true,publishType:'public',config:'4 / 6 / 4',ready:true,classes:2,status:'启用',updated:'2026-07-10'},
 {code:'SE401',name:'软件工程',college:'软件学院',credit:'3.5',type:'专业必修',training:true,publishType:'internal',config:'3 / 5 / 4',ready:false,classes:1,status:'启用',updated:'2026-07-08'},
 {code:'CS301',name:'Python程序设计',college:'计算机学院',credit:'2.0',type:'专业选修',training:false,publishType:'none',classes:2,status:'启用',updated:'2026-06-20'},
 {code:'CS501',name:'计算机组成原理',college:'计算机学院',credit:'4.0',type:'专业必修',training:false,publishType:'none',classes:1,status:'启用',updated:'2026-06-15'},
 {code:'CS601',name:'操作系统',college:'计算机学院',credit:'4.0',type:'专业必修',training:false,publishType:'none',classes:1,status:'启用',updated:'2026-06-12'},
 {code:'CS701',name:'编译原理',college:'计算机学院',credit:'3.0',type:'专业选修',training:false,publishType:'none',classes:0,status:'启用',updated:'2026-05-18'},
 {code:'CS802',name:'多媒体技术（旧版）',college:'计算机学院',credit:'2.0',type:'专业选修',training:false,publishType:'none',classes:0,status:'停用',updated:'2025-08-30'}
];
let courseModalMode='create';
const PUBLISH_META={official:{label:'官方实训课程',badge:'badge-blue',destination:'课程中心－官方实训课程'},public:{label:'公开课',badge:'badge-green',destination:'我的实训－公开课'},internal:{label:'我的实训课',badge:'badge-purple',destination:'我的实训－我的实训课'},none:{label:'不展示',badge:'badge-gray',destination:'仅课程管理可见'}};
function renderCourses(list=COURSES){document.getElementById('course-body').innerHTML=list.map(c=>{const publish=PUBLISH_META[c.publishType||'none'];const config=c.config||'0 / 0 / 0';return `<tr${c.status==='停用'?' style="opacity:.58"':''} data-training="${c.training?'yes':'no'}"><td><b>${c.code}</b></td><td>${c.name} ${c.training?'<span class="badge badge-purple">实训</span>':''}</td><td>${c.college}</td><td>${c.credit}</td><td>${c.type}</td><td><span class="badge ${publish.badge}">${publish.label}</span><div class="publish-destination">${publish.destination}</div></td><td>${c.training?`<div class="training-config"><b>课件 ${config.split(' / ')[0]} · 资源 ${config.split(' / ')[1]} · 任务 ${config.split(' / ')[2]}</b><br><span class="badge ${c.ready?'badge-green':'badge-orange'}">${c.ready?'已配置':'待完善'}</span></div>`:'—'}</td><td><span class="badge badge-blue">${c.classes} 个</span></td><td><span class="course-row-status ${c.status==='启用'?'cs-active':'cs-inactive'}">${c.status}</span></td><td>${c.updated}</td><td><button class="btn btn-sm btn-link" onclick="openCourseModal('edit','${c.code}')">修改</button>${c.training?`<a class="btn btn-sm btn-link" href="course-resource.html?course=${c.code}">资源管理</a>`:''}<button class="btn btn-sm btn-link" onclick="toast('已打开班级列表 Demo','info')">查看班级</button></td></tr>`;}).join('');const officialCount=list.filter(c=>c.publishType==='official').length,publicCount=list.filter(c=>c.publishType==='public').length;document.getElementById('course-count').textContent=`共 ${list.length} 门课程 · 官方实训 ${officialCount} · 公开课 ${publicCount}`;}
function selectedPublishType(){return document.querySelector('input[name="course-publish-type"]:checked')?.value||'internal';}
function togglePublishSetting(){const training=document.getElementById('course-training').checked,setting=document.getElementById('publish-setting');setting.classList.toggle('is-disabled',!training);setting.querySelectorAll('input').forEach(input=>input.disabled=!training);updatePublishDestinationHint();}
function updatePublishDestinationHint(){const training=document.getElementById('course-training').checked,type=training?selectedPublishType():'none';document.getElementById('publish-destination-hint').textContent=training?`当前课程将展示在“${PUBLISH_META[type].destination}”。`:'普通课程不会展示在课程中心或我的实训中。';}
function openCourseModal(mode,code=''){courseModalMode=mode;const found=COURSES.find(c=>c.code===code);document.getElementById('course-modal-title').textContent=mode==='create'?'新增课程':'修改课程';document.getElementById('course-code').value=found?.code||'';document.getElementById('course-name').value=found?.name||'';document.getElementById('course-training').checked=found?.training??false;document.getElementById('course-college').value=found?.college||'';const publishType=found?.publishType||'internal';const radio=document.querySelector(`input[name="course-publish-type"][value="${publishType==='none'?'internal':publishType}"]`);if(radio)radio.checked=true;togglePublishSetting();openModal('m-course');setTimeout(()=>document.getElementById('course-code').focus(),0);}
function saveCourse(){const code=document.getElementById('course-code'),name=document.getElementById('course-name'),college=document.getElementById('course-college');if(!code.value.trim()){toast('请输入课程编号','warning');code.focus();return}if(!name.value.trim()){toast('请输入课程名称','warning');name.focus();return}if(!college.value){toast('请选择开课学院','warning');college.focus();return}const training=document.getElementById('course-training').checked,publishType=training?selectedPublishType():'none';const found=COURSES.find(c=>c.code===code.value.trim());if(courseModalMode==='create'&&!found)COURSES.unshift({code:code.value.trim(),name:name.value.trim(),college:college.value,credit:'—',type:'专业选修',training,publishType,config:'0 / 0 / 0',ready:false,classes:0,status:'启用',updated:'2026-07-22'});else if(found)Object.assign(found,{name:name.value.trim(),college:college.value,training,publishType,updated:'2026-07-22'});closeModal('m-course');renderCourses();toast(training?`课程已${courseModalMode==='create'?'新增':'更新'}，将展示在${PUBLISH_META[publishType].destination}`:`课程已${courseModalMode==='create'?'新增':'更新'}`,'success');}
function queryCourses(){const code=document.getElementById('filter-code').value.trim().toLowerCase(),name=document.getElementById('filter-name').value.trim().toLowerCase(),college=document.getElementById('filter-college').value,status=document.getElementById('filter-status').value,training=document.getElementById('filter-training').value,publishType=document.getElementById('filter-publish-type').value;const list=COURSES.filter(c=>(!code||c.code.toLowerCase().includes(code))&&(!name||c.name.toLowerCase().includes(name))&&(!college||c.college===college)&&(!status||c.status===status)&&(!training||(training==='yes')===c.training)&&(!publishType||c.publishType===publishType));renderCourses(list);toast(`已查询到 ${list.length} 门课程`,'success');}
function resetFilters(){document.querySelectorAll('.filter-bar input,.filter-bar select').forEach(el=>el.value='');renderCourses();toast('筛选条件已重置','info');}
document.addEventListener('DOMContentLoaded',()=>{renderCourses();document.querySelectorAll('input[name="course-publish-type"]').forEach(input=>input.addEventListener('change',updatePublishDestinationHint));});
</script>
<script src="../assets/shared.js"></script>
</body></html>
