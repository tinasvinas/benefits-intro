const PAGE_MEMORY_STORAGE=(()=>{const data=new Map();return{getItem:key=>data.has(key)?data.get(key):null,setItem:(key,value)=>data.set(key,String(value)),removeItem:key=>data.delete(key)}})();
const KEY='agent-training-progress-v1';let state=loadState(),taskId=Number(new URLSearchParams(location.search).get('module'))||3,panel='resources';
function loadState(){try{return JSON.parse(PAGE_MEMORY_STORAGE.getItem(KEY)||'{}')}catch{return {}}}function itemState(id){if(!state[id])state[id]={steps:[],completed:false,records:[]};return state[id]}function save(){PAGE_MEMORY_STORAGE.setItem(KEY,JSON.stringify(state))}function current(){return TASKS.find(t=>t.id===taskId)||TASKS[2]}function statusOf(t){return itemState(t.id).completed?'completed':t.status}function split(s){return s.split('|')}
function renderList(){let g='';document.getElementById('task-list').innerHTML=TASKS.map(t=>{let gh=t.group!==g?`<div class="group">${t.group}</div>`:'';g=t.group;let st=statusOf(t);return `${gh}<div class="task-item ${st} ${t.id===taskId?'active':''}" onclick="selectTask(${t.id})"><div class="task-dot">${st==='completed'?'✓':String(t.id).padStart(2,'0')}</div><div><b>${t.title}</b><span>${st==='completed'?'已完成':st==='locked'?'前置任务未完成':t.duration}</span></div></div>`}).join('')}
function render(){let t=current(),s=itemState(t.id),st=statusOf(t);brief.dataset.index=String(t.id).padStart(2,'0');kicker.textContent=t.code;document.getElementById('task-title').textContent=t.title;document.getElementById('task-desc').textContent=t.desc;let badge=document.getElementById('task-status');badge.className=`status ${st}`;badge.textContent=st==='completed'?'已完成':st==='locked'?'未解锁':st==='active'?'进行中':'待开始';metrics.innerHTML=`<div class="metric"><span>建议时长</span><b>${t.duration}</b></div><div class="metric"><span>能力证据</span><b>${t.evidence}</b></div><div class="metric"><span>项目版本</span><b>${t.version}</b></div><div class="metric"><span>任务步骤</span><b>${t.steps.length} 项</b></div>`;scenario.innerHTML=`<b>项目情境：</b>${t.scenario}`;goals.innerHTML=t.goals.map((x,i)=>{let a=split(x);return `<div class="goal"><em>GOAL 0${i+1}</em><b>${a[0]}</b><p>${a[1]}</p></div>`}).join('');acceptance.innerHTML=t.acceptance.map((x,i)=>{let a=split(x);return `<div class="accept"><i>${i+1}</i><div><b>${a[0]}</b><span>${a[1]}</span></div></div>`}).join('');version.textContent=`当前版本 ${t.version} · 本页临时记录`;remaining.textContent=t.remaining;prev.disabled=t.id===1;next.disabled=t.id===6;complete.disabled=st==='locked'||s.completed;complete.textContent=s.completed?'本任务已完成':st==='locked'?'任务未解锁':'标记本任务完成';renderSteps();renderSide();renderList();updateOverall()}
function renderSteps(){let t=current(),s=itemState(t.id);steps.innerHTML=t.steps.map((x,i)=>{let a=split(x),done=s.steps.includes(i);return `<div class="step ${done?'done':''}"><button class="check" onclick="toggleStep(${i})">✓</button><div><b>${i+1}. ${a[0]}</b><p>${a[1]}</p></div><button class="step-link" onclick="stepAction('${a[2]}')">${a[2]} →</button></div>`}).join('');let n=s.steps.length,p=Math.round(n/t.steps.length*100);document.getElementById('step-count').textContent=`已完成 ${n} / ${t.steps.length}`;document.getElementById('task-progress').textContent=`任务进度 ${p}%`}
function toggleStep(i){let t=current();if(statusOf(t)==='locked'){toast('请先完成前置任务','warning');return}let s=itemState(t.id),p=s.steps.indexOf(i);p>=0?s.steps.splice(p,1):s.steps.push(i);s.steps.sort();save();renderSteps();updateOverall()}
function stepAction(label){if(label.includes('开发台'))location.href='agent-development.html';else if(label.includes('数据库'))location.href='agent-database.html';else toast(`${label} Demo`,'info')}
function renderSide(){document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.panel===panel));let t=current(),s=itemState(t.id),body=document.getElementById('side-body');if(panel==='resources'){body.innerHTML=`<div class="side-section"><h3>任务资料</h3>${t.resources.map(x=>{let a=split(x);return `<div class="resource" onclick="toast('打开 ${a[1]} Demo','info')"><div class="res-icon">${a[0]}</div><div><b>${a[1]}</b><span>${a[2]}</span></div><span class="open">查看</span></div>`}).join('')}</div><div class="side-section"><h3>本任务提示</h3><div class="tip">先完成最小可用配置并保存测试证据，再进行参数微调。每次只改变一个关键参数，便于判断优化是否有效。</div></div>`}else if(panel==='records'){let records=[{title:'调整召回数量',content:'Top-K 从 3 调整为 5，长流程问题完整度有所提升。',time:'今天 16:24'},...s.records];body.innerHTML=`<div class="side-section"><h3>开发记录</h3>${records.map(r=>`<div class="record"><b>${r.title}</b>${r.content}<br><small>${r.time}</small></div>`).join('')}<textarea class="record-input" id="record-input" placeholder="记录本次修改、测试现象或待解决问题"></textarea><div class="record-action"><button class="btn btn-primary btn-sm" onclick="addRecord()">新增记录</button></div></div>`}else{body.innerHTML=`<div class="side-section"><h3>本任务提交物</h3>${t.submissions.map(x=>{let a=split(x);return `<div class="submission ${a[2]==='必需'?'required':''}"><div class="submission-head"><b>${a[0]}</b><span>${a[2]}</span></div><p>支持格式：${a[1]}</p></div>`}).join('')}<button class="btn btn-primary" style="width:100%" onclick="submitWork()">提交成果</button><div class="submit-note">提交前请确认文件可正常打开、命名清晰，内容与当前任务版本一致。</div></div>`}}
function addRecord(){let el=document.getElementById('record-input'),v=el.value.trim();if(!v){toast('请输入开发记录内容','warning');el.focus();return}itemState(taskId).records.unshift({title:'实训记录',content:v,time:'刚刚'});save();renderSide();toast('开发记录已新增','success')}
function submitWork(){if(!itemState(taskId).completed){toast('请先完成任务步骤并通过验收','warning');return}toast('成果已提交，等待导师验收','success')}function saveProgress(){save();toast('当前页面进度已更新，刷新后将重置','success')}
function completeTask(){let t=current(),s=itemState(t.id);if(s.steps.length<t.steps.length){toast(`还有 ${t.steps.length-s.steps.length} 个步骤未完成`,'warning');return}s.completed=true;save();render();toast('本任务已完成，能力证据已记录','success')}
function selectTask(id){taskId=id;history.replaceState(null,'',`agent-training-task.html?module=${id}`);render();document.querySelector('.main-pane').scrollTo({top:0,behavior:'smooth'})}function switchTask(d){let id=Math.max(1,Math.min(6,taskId+d));if(id!==taskId)selectTask(id)}
function updateOverall(){let done=TASKS.filter(t=>statusOf(t)==='completed').length,partial=TASKS.reduce((n,t)=>n+itemState(t.id).steps.length/t.steps.length,0),p=Math.min(100,Math.round((done+partial*.35)/6*100));document.getElementById('overall-text').textContent=`${p}%`;document.getElementById('overall-fill').style.width=`${p}%`}
document.querySelector('.tabs').addEventListener('click',e=>{let t=e.target.closest('[data-panel]');if(t){panel=t.dataset.panel;renderSide()}});render();
</script>
