<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>课程学习 · 初发 Trufar</title>
<link rel="stylesheet" href="../assets/shared.css">
<style>
/* 整体布局 */
#content{display:flex;height:100%;padding:0!important;overflow:hidden}

/* 左侧章节目录 */
.chapter-nav{
  width:240px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.chapter-nav-head{
  padding:16px 16px 12px;border-bottom:1px solid var(--border);
}
.chapter-nav-head h3{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:4px}
.chapter-nav-head .progress-summary{font-size:11px;color:var(--text-sub);display:flex;align-items:center;gap:6px}
.chapter-nav-head .progress-summary .pg-mini{flex:1;height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden}
.chapter-nav-head .progress-summary .pg-mini-fill{height:100%;background:var(--success);border-radius:2px}

.chapter-list{flex:1;overflow-y:auto;padding:8px 0}
.chapter-list::-webkit-scrollbar{width:4px}
.chapter-list::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}

.chapter-group-label{
  padding:10px 16px 4px;font-size:10px;color:var(--text-mute);font-weight:600;
  text-transform:uppercase;letter-spacing:.3px;
}
.chapter-item{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  cursor:pointer;transition:all .15s;font-size:12px;color:var(--text-sub);
  border-left:3px solid transparent;
}
.chapter-item:hover{background:var(--accent-soft);color:var(--primary)}
.chapter-item.active{background:var(--accent-soft);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.chapter-item.completed{color:var(--success)}
.chapter-item .ch-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;border:1.5px solid currentColor}
.chapter-item.completed .ch-icon{background:var(--success);border-color:var(--success);color:#fff}
.chapter-item.active .ch-icon{border-color:var(--accent);color:var(--accent)}
.chapter-item .ch-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chapter-item .ch-dur{font-size:10px;color:var(--text-mute);flex-shrink:0}

/* 主学习区域 */
.learn-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* 顶部进度条 */
.learn-topbar{
  padding:12px 20px;background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.learn-topbar .course-title{font-size:15px;font-weight:600;color:var(--primary)}
.learn-topbar .learn-stats{display:flex;gap:16px;font-size:12px;color:var(--text-sub)}
.learn-topbar .learn-stats .stat-item{display:flex;align-items:center;gap:4px}
.learn-topbar .learn-stats .stat-val{font-weight:700;color:var(--primary)}

/* 内容分栏：视频 + 讲义 */
.learn-content{flex:1;display:flex;overflow:hidden}

/* 视频区域 */
.video-panel{
  flex:1;min-width:0;display:flex;flex-direction:column;background:#0f172a;
}
.video-player{
  flex:1;display:flex;align-items:center;justify-content:center;position:relative;
  background:#000;min-height:300px;
}
.video-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:12px;color:rgba(255,255,255,.7);
}
.video-placeholder .play-btn{
  width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .2s;border:2px solid rgba(255,255,255,.3);
}
.video-placeholder .play-btn:hover{background:var(--accent);border-color:var(--accent);transform:scale(1.1)}
.video-placeholder .play-btn svg{width:28px;height:28px;fill:#fff;margin-left:4px}
.video-placeholder .title{font-size:14px;font-weight:500}
.video-placeholder .sub{font-size:11px;opacity:.6}

/* 视频控制栏 */
.video-controls{
  padding:10px 16px;background:#1e293b;display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.video-controls .time{font-size:11px;color:rgba(255,255,255,.7);font-family:'Courier New',monospace}
.video-controls .progress-track{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;position:relative}
.video-controls .progress-played{height:100%;background:var(--accent);border-radius:2px;width:35%;transition:width .3s}
.video-controls .ctrl-btn{
  width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(255,255,255,.8);transition:all .15s;
}
.video-controls .ctrl-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.video-controls .ctrl-btn svg{width:16px;height:16px}

/* 讲义面板 */
.notes-panel{
  width:380px;flex-shrink:0;background:#fff;border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.notes-head{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.notes-head h4{font-size:13px;font-weight:600;color:var(--primary)}
.notes-tabs{display:flex;gap:2px;background:#f1f5f9;border-radius:6px;padding:2px}
.notes-tab{
  padding:4px 12px;font-size:11px;border-radius:4px;cursor:pointer;
  color:var(--text-sub);transition:all .15s;font-weight:500;
}
.notes-tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}

.notes-body{flex:1;overflow-y:auto;padding:16px}
.notes-body::-webkit-scrollbar{width:4px}
.notes-body::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px}

/* 讲义内容样式 */
.note-section{margin-bottom:20px}
.note-section h5{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed #f1f5f9}
.note-section p{font-size:12px;color:#475569;line-height:1.8;margin-bottom:8px}
.note-section ul{padding-left:16px;font-size:12px;color:#475569;line-height:2}
.note-section .highlight{background:var(--accent-soft);border-left:3px solid var(--accent);padding:10px 12px;border-radius:0 6px 6px 0;font-size:12px;color:var(--primary);margin:10px 0}
.note-section .code-block{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px 12px;font-family:'Courier New',monospace;font-size:11px;color:#334155;margin:8px 0;overflow-x:auto}

/* 资源链接 */
.resource-list{list-style:none;padding:0}
.resource-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border:1px solid #f1f5f9;border-radius:8px;margin-bottom:8px;
  cursor:pointer;transition:all .15s;
}
.resource-item:hover{background:var(--accent-soft);border-color:var(--accent-soft-2)}
.resource-item .res-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.resource-item .res-info{flex:1;min-width:0}
.resource-item .res-name{font-size:12px;font-weight:500;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.resource-item .res-meta{font-size:10px;color:var(--text-mute);margin-top:2px}
.resource-item .res-action{font-size:11px;color:var(--accent);font-weight:500;flex-shrink:0}
</style>
</head>

<script>
// ========== 课程章节数据 ==========
const CHAPTERS = [
  { group:'基础理论课程', lessons:[
    { id:'1-1', title:'什么是大模型', duration:'45:20', status:'completed',
      notes:'大模型概述',
      content:`<div class="note-section"><h5>什么是大模型</h5><p>大语言模型（Large Language Model, LLM）是一种基于深度学习的自然语言处理模型，通过海量文本数据训练而成，具备理解和生成自然语言的能力。</p><div class="highlight">核心特征：参数规模大（通常超过百亿）、训练数据量大、涌现能力强</div></div><div class="note-section"><h5>大模型的特点</h5><ul><li>强大的语言理解与生成能力</li><li>上下文学习（In-Context Learning）</li><li>思维链推理（Chain-of-Thought）</li><li>指令遵循能力</li></ul></div><div class="note-section"><h5>大模型的能力边界</h5><p>大模型擅长文本生成、摘要、翻译、代码编写等任务，但也存在幻觉、知识截止、数学推理薄弱等不足。</p></div>` },
    { id:'1-2', title:'提示词工程', duration:'38:15', status:'completed',
      notes:'Prompt Engineering',
      content:`<div class="note-section"><h5>提示词工程概述</h5><p>提示词工程（Prompt Engineering）是设计和优化输入提示以引导大模型产生期望输出的技术。</p><div class="highlight">好的提示词 = 清晰的指令 + 充分的上下文 + 明确的约束 + 输出格式要求</div></div><div class="note-section"><h5>核心技巧</h5><ul><li>角色设定：赋予模型特定身份</li><li>任务分解：复杂任务拆分为步骤</li><li>Few-shot：提供示例引导输出格式</li><li>思维链：要求模型逐步推理</li></ul></div><div class="note-section"><h5>常见模式</h5><div class="code-block">你是一位{角色}，擅长{能力}。\n请根据以下{输入类型}，完成{任务描述}。\n要求：{约束条件}\n输出格式：{格式说明}</div></div>` },
  ]},
  { group:'实训课程-入门', lessons:[
    { id:'2-1', title:'初发平台介绍', duration:'25:00', status:'active',
      notes:'平台功能与操作',
      content:`<div class="note-section"><h5>初发平台简介</h5><p>初发（Trufar）是一个面向高校的智能体开发实训平台，支持学生从零开始创建、调试和发布各类AI智能体。</p></div><div class="note-section"><h5>平台核心模块</h5><ul><li>智能体市场：浏览和使用已发布的智能体</li><li>智能体开发：创建和配置智能体</li><li>数据库：管理知识库数据</li><li>实训课程：视频+讲义学习</li></ul></div>` },
    { id:'2-2', title:'创建单角色聊天型智能体', duration:'35:10', status:'pending',
      notes:'提示词配置',
      content:`<div class="note-section"><h5>实训目标</h5><p>学习创建一个单角色聊天型智能体，掌握提示词（System Prompt）的基本写法。</p><div class="highlight">本节实训完成后，你将拥有一个可对话的专属AI角色</div></div><div class="note-section"><h5>操作步骤</h5><ul><li>进入「智能体开发」→「创建智能体」</li><li>选择「聊天型」模板</li><li>配置角色名称、头像</li><li>编写系统提示词</li><li>测试对话效果</li><li>发布到班级</li></ul></div>` },
    { id:'2-3', title:'创建多角色聊天型智能体', duration:'40:25', status:'pending',
      notes:'提示词+变量',
      content:`<div class="note-section"><h5>实训目标</h5><p>学习使用变量机制，创建支持多角色切换的聊天型智能体。</p></div><div class="note-section"><h5>核心概念：变量</h5><p>变量允许在提示词中插入动态内容，实现同一套逻辑支撑多个角色人设。</p><div class="code-block">你是{{role_name}}，性格{{personality}}。\n请以该角色身份与用户对话。</div></div>` },
    { id:'2-4', title:'创建多角色启发式智能体', duration:'42:30', status:'pending',
      notes:'提示词+变量+多步骤流程',
      content:`<div class="note-section"><h5>实训目标</h5><p>学习多步骤流程设计，创建能引导用户逐步思考的启发式智能体。</p></div><div class="note-section"><h5>多步骤流程</h5><ul><li>步骤1：收集用户问题</li><li>步骤2：引导用户思考方向</li><li>步骤3：给出提示而非直接答案</li><li>步骤4：确认用户理解并总结</li></ul></div>` },
  ]},
  { group:'实训课程-进阶', lessons:[
    { id:'3-1', title:'RAG基础与知识库', duration:'50:00', status:'pending',
      notes:'检索增强生成',
      content:`<div class="note-section"><h5>什么是RAG</h5><p>RAG（Retrieval-Augmented Generation）检索增强生成，通过外挂知识库为大模型提供实时、准确的领域知识。</p><div class="highlight">RAG = 检索（Retrieval） + 生成（Generation），解决大模型知识截止和幻觉问题</div></div>` },
    { id:'3-2', title:'创建与调优知识库', duration:'45:30', status:'pending',
      notes:'知识库管理',
      content:`<div class="note-section"><h5>知识库创建流程</h5><ul><li>准备文档数据（PDF、Word、TXT等）</li><li>文档切片与向量化</li><li>配置检索参数（Top-K、相似度阈值）</li><li>测试检索效果</li></ul></div>` },
    { id:'3-3', title:'开发知识库智能体', duration:'55:00', status:'pending',
      notes:'提示词+变量+流程+知识库',
      content:`<div class="note-section"><h5>实训目标</h5><p>综合运用所学技能，创建一个具备知识库检索能力的多角色启发式智能体。</p></div>` },
  ]},
  { group:'实训课程-高阶', lessons:[
    { id:'4-1', title:'前端自定义基础', duration:'50:00', status:'pending',
      notes:'自定义界面',
      content:`<div class="note-section"><h5>前端自定义</h5><p>通过自定义前端界面，将智能体从纯对话模式升级为具备完整交互界面的应用。</p></div>` },
    { id:'4-2', title:'工作流基础功能', duration:'55:00', status:'pending',
      notes:'工作流设计',
      content:`<div class="note-section"><h5>工作流概述</h5><p>工作流允许将多个AI操作串联为自动化流程，实现复杂业务逻辑。</p></div>` },
    { id:'4-3', title:'创建简单应用型智能体', duration:'60:00', status:'pending',
      notes:'案例实操',
      content:`<div class="note-section"><h5>实训目标</h5><p>创建一个具有自定义前端和简单工作流的应用型智能体。</p></div>` },
    { id:'4-4', title:'创建复杂应用型智能体', duration:'90:00', status:'pending',
      notes:'完整业务逻辑',
      content:`<div class="note-section"><h5>实训目标</h5><p>创建一个具备完整业务逻辑（前端+工作流+知识库+多步骤）的应用型智能体。</p></div>` },
  ]},
  { group:'实训分享', lessons:[
    { id:'5-1', title:'智能体分享与展示', duration:'45:00', status:'pending',
      notes:'同学互评',
      content:`<div class="note-section"><h5>分享环节</h5><p>向班级同学展示自己开发的智能体作品，互相交流学习心得和开发技巧。</p></div>` },
  ]},
];

let currentLesson = '2-1'; // 默认当前课

function renderChapters(){
  const list = document.getElementById('chapter-list');
  list.innerHTML = CHAPTERS.map(ch => {
    const lessonsHtml = ch.lessons.map(l => {
      const statusIcon = l.status==='completed' ? '✓' : l.status==='active' ? '▶' : '';
      return `<div class="chapter-item ${l.status}" data-id="${l.id}" onclick="selectLesson('${l.id}')">
        <span class="ch-icon">${statusIcon}</span>
        <span class="ch-title">${l.title}</span>
        <span class="ch-dur">${l.duration}</span>
      </div>`;
    }).join('');
    return `<div class="chapter-group-label">${ch.group}</div>${lessonsHtml}`;
  }).join('');
}

function selectLesson(id){
  currentLesson = id;
  // 更新章节高亮
  document.querySelectorAll('.chapter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  // 查找课程信息
  let lesson = null;
  CHAPTERS.forEach(ch => ch.lessons.forEach(l => { if(l.id===id) lesson=l; }));
  if(!lesson) return;
  // 更新标题
  document.getElementById('current-lesson-title').textContent = lesson.title;
  document.getElementById('video-title').textContent = lesson.title;
  // 更新讲义
  renderNotes();
}

function renderNotes(){
  let lesson = null;
  CHAPTERS.forEach(ch => ch.lessons.forEach(l => { if(l.id===currentLesson) lesson=l; }));
  if(!lesson) return;

  const activeTab = document.querySelector('.notes-tab.active');
  const tab = activeTab ? activeTab.textContent : '讲义';

  const body = document.getElementById('notes-body');
  if(tab === '讲义'){
    body.innerHTML = lesson.content || '<div style="color:var(--text-mute);padding:20px;text-align:center">暂无讲义内容</div>';
  } else {
    const res = RESOURCES[currentLesson] || [];
    if(res.length === 0){
      body.innerHTML = '<div style="color:var(--text-mute);padding:20px;text-align:center">暂无相关资源</div>';
    } else {
      body.innerHTML = `<ul class="resource-list">${res.map(r => `
        <li class="resource-item" onclick="window.open('${r.url}','_blank')">
          <div class="res-icon" style="background:${r.color}20;color:${r.color}">${r.icon}</div>
          <div class="res-info">
            <div class="res-name">${r.name}</div>
            <div class="res-meta">${r.type}</div>
          </div>
          <span class="res-action">查看 →</span>
        </li>
      `).join('')}</ul>`;
    }
  }
}

function switchNotesTab(el, tab){
  document.querySelectorAll('.notes-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderNotes();
}

// 初始化
renderChapters();
selectLesson(currentLesson);
</script>
</body>
</html>
