<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>权益介绍 · 初发 Trufar</title>
<style>
:root {
  color-scheme: light;
  --page: #ffffff;
  --card: #fafafa;
  --card-hover: #ffffff;
  --line: #e9e9e7;
  --line-soft: #eeeeec;
  --text: #151515;
  --text-secondary: #5f625f;
  --text-muted: #9b9d9a;
  --accent: #1d1d1f;
  --accent-soft: #f2f0ea;
  --success: #4d514e;
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-width: 320px;
  padding: 0 0 24px;
  background: #f4f5f7;
  color: var(--text);
  font-family: Inter, "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

button { font: inherit; }

.app-topbar {
  position: sticky;
  z-index: 20;
  top: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 64px;
  padding: 0 24px;
  border-bottom: 1px solid #e7e8ea;
  background: rgba(255, 255, 255, 0.96);
  box-shadow: 0 1px 8px rgba(20, 24, 32, 0.04);
  backdrop-filter: blur(12px);
}

.topbar-left,
.brand-lockup,
.page-identity {
  display: flex;
  align-items: center;
}

.topbar-left { min-width: 0; gap: 20px; }

.brand-lockup {
  flex: 0 0 auto;
  gap: 9px;
}

.brand-mark {
  display: block;
  width: 36px;
  height: 36px;
  flex: 0 0 36px;
  overflow: hidden;
  border-radius: 8px;
  background: #fff;
}

.brand-mark img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.brand-name {
  color: #1b1d21;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.topbar-divider {
  width: 1px;
  height: 24px;
  background: #e5e6e8;
}

.page-identity { min-width: 0; gap: 10px; }

.page-icon {
  display: grid;
  width: 30px;
  height: 30px;
  flex: 0 0 30px;
  place-items: center;
  border: 1px solid #e5e8ed;
  border-radius: 8px;
  background: #f7f8fa;
  color: #4169ad;
}

.page-icon svg { width: 16px; height: 16px; }

.page-title-group { min-width: 0; }

.page-title {
  overflow: hidden;
  color: #24262a;
  font-size: 14px;
  font-weight: 650;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.page-subtitle {
  margin-top: 1px;
  overflow: hidden;
  color: #92969d;
  font-size: 11px;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.container {
  width: calc(100% - 32px);
  max-width: 1600px;
  margin: 16px auto 0;
  padding: 8px;
  border: 1px solid #e7e8ea;
  border-radius: 14px;
  background: #fff;
  box-shadow: 0 8px 28px rgba(25, 31, 42, 0.05);
}

.intro-banner {
  margin: 4px 4px 10px;
  padding: 20px 28px 18px;
  border-radius: 11px;
  background: linear-gradient(112deg, #244878 0%, #285db8 55%, #2f6af0 100%);
  color: #fff;
  box-shadow: 0 5px 14px rgba(27, 67, 135, 0.16);
}

.intro-title {
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 21px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.intro-title-icon {
  width: 18px;
  height: 18px;
  color: #4ed2ff;
}

.intro-summary {
  margin-top: 7px;
  color: rgba(255, 255, 255, 0.88);
  font-size: 12px;
}

.intro-rules {
  max-width: 980px;
  margin-top: 15px;
  padding-top: 13px;
  border-top: 1px solid rgba(255, 255, 255, 0.2);
  color: rgba(255, 255, 255, 0.9);
  font-size: 12px;
  line-height: 1.65;
}

.intro-rules strong { color: #fff; font-weight: 650; }

.plan-tabs {
  display: flex;
  align-items: center;
  gap: 18px;
  height: 42px;
  padding: 0 4px;
  border-bottom: 1px solid var(--line-soft);
}

.plan-tab {
  position: relative;
  height: 42px;
  padding: 0;
  border: 0;
  background: transparent;
  color: #777a77;
  font-size: 14px;
  cursor: pointer;
  transition: color 180ms ease;
}

.plan-tab:hover { color: var(--text); }

.plan-tab.active {
  color: var(--text);
  font-weight: 600;
}

.plan-tab.active::after {
  position: absolute;
  right: 0;
  bottom: -1px;
  left: 0;
  height: 2px;
  border-radius: 2px;
  background: var(--text);
  content: "";
}

.plan-tab:focus-visible,
.plan-action:focus-visible {
  outline: 2px solid #555;
  outline-offset: 3px;
}

.plan-pane { display: none; }
.plan-pane.active { display: block; animation: pane-in 220ms ease both; }

@keyframes pane-in {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.plan-grid {
  display: grid;
  grid-template-columns: repeat(var(--columns, 5), minmax(0, 1fr));
  gap: 10px;
  padding-top: 10px;
}

.plan-card {
  display: flex;
  min-height: 470px;
  flex-direction: column;
  padding: 18px 18px 20px;
  overflow: hidden;
  border: 1px solid transparent;
  border-radius: var(--radius);
  background: var(--card);
  transition: border-color 200ms ease, box-shadow 200ms ease, background 200ms ease;
}

.plan-card:hover {
  border-color: #dfdfdc;
  background: var(--card-hover);
  box-shadow: 0 8px 24px rgba(20, 20, 20, 0.06);
}

.plan-card.highlight {
  background: #f8f7f3;
}

.plan-name {
  min-height: 24px;
  font-size: 15px;
  font-weight: 650;
  letter-spacing: -0.01em;
}

.plan-tag {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  min-height: 20px;
  margin-top: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  background: #eeece5;
  color: #857b62;
  font-size: 11px;
  font-weight: 500;
}

.price-block {
  min-height: 68px;
  padding-top: 10px;
}

.price-line {
  display: flex;
  align-items: baseline;
  min-height: 35px;
  white-space: nowrap;
}

.price-main {
  font-size: clamp(24px, 2.1vw, 32px);
  font-weight: 650;
  line-height: 1.1;
  letter-spacing: -0.045em;
}

.price-unit {
  margin-left: 4px;
  color: var(--text-secondary);
  font-size: 13px;
}

.price-desc {
  min-height: 20px;
  margin-top: 4px;
  color: var(--text-muted);
  font-size: 12px;
}

.quota {
  display: flex;
  min-height: 112px;
  flex-direction: column;
  justify-content: center;
  margin-top: 2px;
  padding: 9px 0;
  border-top: 1px dashed #dededb;
  border-bottom: 1px dashed #dededb;
  color: #444744;
  font-size: 12px;
}

.quota-heading {
  margin-bottom: 4px;
  color: #303330;
  font-weight: 650;
}

.quota-note {
  margin-top: 5px;
  color: var(--text-muted);
  font-size: 11px;
  line-height: 1.45;
}

.quota-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 28px;
}

.quota-row + .quota-row {
  border-top: 1px solid #eeeeeb;
}

.quota-label { color: var(--text-secondary); }
.quota-value { color: var(--text); font-weight: 550; text-align: right; }

.plan-action {
  position: relative;
  width: 100%;
  height: 36px;
  margin: 13px 0 18px;
  border: 1px solid #dededb;
  border-radius: 8px;
  background: #fff;
  color: #3f423f;
  font-size: 12px;
  cursor: pointer;
  transition: color 180ms ease, border-color 180ms ease, background 180ms ease;
}

.plan-action[data-tip]:hover::after {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  padding: 6px 10px;
  border-radius: 6px;
  background: #1f2937;
  color: #fff;
  white-space: nowrap;
  font-size: 11px;
  line-height: 1.4;
  box-shadow: 0 6px 16px rgba(15, 23, 42, 0.22);
  content: attr(data-tip);
  pointer-events: none;
}

.plan-action[data-tip]:hover::before {
  position: absolute;
  bottom: calc(100% + 2px);
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border: 6px solid transparent;
  border-top-color: #1f2937;
  content: "";
  pointer-events: none;
}

.plan-action:hover:not(:disabled) {
  border-color: #b8b9b6;
  background: #f6f6f4;
  color: var(--text);
}

.plan-action:disabled {
  color: #aaa;
  cursor: default;
  background: rgba(255, 255, 255, 0.66);
}

.plan-action-placeholder {
  width: 100%;
  height: 36px;
  margin: 13px 0 18px;
}

.benefit-heading {
  margin-bottom: 9px;
  color: #3d403e;
  font-size: 12px;
  font-weight: 650;
}

.benefit-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
  list-style: none;
}

.benefit-item {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  color: #464946;
  font-size: 12px;
  line-height: 1.42;
}

.teacher-note-item {
  margin-top: 3px;
  padding: 10px;
  border: 1px solid #e2d8bf;
  border-radius: 8px;
  background: #fffaf0;
  color: #61563f;
  line-height: 1.65;
}

.teacher-note-item .check-icon {
  margin-top: 4px;
  color: #a47d2d;
}

.teacher-note-item strong {
  color: #8b641c;
  font-weight: 700;
}

.check-icon {
  width: 12px;
  height: 12px;
  flex: 0 0 12px;
  margin-top: 2px;
  color: #535754;
}

.addon-wrap { padding-top: 10px; }
.addon-grid { --columns: 2; max-width: 780px; }
.addon-card { min-height: 300px; }

.addon-note {
  display: flex;
  gap: 10px;
  max-width: 780px;
  margin-top: 14px;
  padding: 14px 16px;
  border: 1px solid #f3dca6;
  border-left: 3px solid #e0a92e;
  border-radius: 10px;
  background: #fdf8ec;
  color: #6a5325;
  font-size: 12px;
  line-height: 1.6;
}

.addon-note .note-icon {
  flex: 0 0 auto;
  width: 16px;
  height: 16px;
  margin-top: 1px;
  color: #e0a92e;
}

.addon-note .note-body {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.addon-note .note-title {
  color: #8a6a1f;
  font-weight: 600;
}

.addon-note .note-line {
  position: relative;
  padding-left: 12px;
}

.addon-note .note-line::before {
  position: absolute;
  left: 0;
  top: 7px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #d9a634;
  content: "";
}

.empty-value { color: var(--text-muted); }

@media (max-width: 1100px) {
  .plan-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}

@media (max-width: 760px) {
  body { padding-bottom: 16px; }
  .app-topbar { min-height: 58px; padding: 0 14px; }
  .topbar-left { gap: 12px; }
  .brand-name { display: none; }
  .topbar-divider { height: 22px; }
  .page-subtitle { display: none; }
  .container { width: calc(100% - 16px); margin-top: 8px; padding: 6px; }
  .intro-banner { margin: 2px 0 10px; padding: 18px 20px; }
  .intro-title { font-size: 19px; }
  .plan-tabs { gap: 22px; overflow-x: auto; }
  .plan-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .plan-card { min-height: 440px; }
}

@media (max-width: 520px) {
  .plan-grid { grid-template-columns: 1fr; }
  .plan-card { min-height: auto; }
  .price-main { font-size: 30px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>
</head>

      { key: "teacher", name: "教师版", tag: "教师专属", price: "600 元/月", action: "购买教师版", highlight: true }
    ],
    rows: [

      { type: "benefit", label: "新增模型", values: { a: false, b: true, c: true, teacher: true } },
      { type: "benefit", label: "教学管理", values: { a: true, b: true, c: true, teacher: true } },
      { type: "benefit", label: "班级数量（每学期）", values: { a: "3 个", b: "5 个", c: "10", teacher: "10" } },

      { key: "trial", name: "企业体验版", tag: "免费试用 6 个月", price: "900 元", action: "购买企业体验版" },
      { key: "vip", name: "企业 VIP", tag: "团队版", price: "6,000 元/年", action: "购买企业 VIP" },
      { key: "vip1", name: "企业 VIP进阶", tag: "学院版", price: "5万 元/年", action: "购买企业 VIP进阶" },
      { key: "svip", name: "企业 SVIP", tag: "学校版", price: "20万 元/年", action: "购买企业 SVIP", highlight: true }
    ],
    rows: [
      { type: "quota", label: "学校累计 Token", values: { free: "0 Token", trial: "10,000,000 Token", vip: "50,000,000 Token", vip1: "500,000,000 Token", svip: "3,000,000,000 Token" } },
      { type: "benefit", label: "付费工具使用次数", values: { free: "0 次", trial: "100 次", vip: "2,000 次", vip1: "20,000 次", svip: "80,000 次" } },
      { type: "benefit", label: "知识库文档数量/人", values: { free: "5 个", trial: "50 个", vip: "500 个", vip1: "500 个", svip: "1,000 个" } },
      { type: "benefit", label: "新增模型", values: { free: false, trial: false, vip: true, vip1: true, svip: true } },
      { type: "benefit", label: "教学管理", values: { free: false, trial: true, vip: true, vip1: true, svip: true } },
      { type: "benefit", label: "学校班级总数量（每学期）", values: { free: false, trial: "30 个", vip: "200 个", vip1: "200 个", svip: "无限制" } },

      { type: "benefit", label: "账户数量 · 教师", values: { free: "无限制", trial: "30 个", vip: "10 个", vip1: "30 个", svip: "无限制" } },
      { type: "benefit", label: "账户数量 · 学生", values: { free: "无限制", trial: "1,500 个", vip: "200 个", vip1: "1,500 个", svip: "无限制" } },
      { type: "benefit", label: "账户数量 · 运营", values: { free: "无限制", trial: "1 个", vip: "1 个", vip1: "1 个", svip: "无限制" } }

      { name: "个人增量包", tag: "个人补充", price: "100 元", quota: "10,000,000 Token", action: "购买个人增量包", desc: "可叠加购买，个人权益到期后将无法使用增量包", benefits: ["按个人账户独立生效", "未消耗额度可继续使用", "权益配额用尽后自动扣减"] }
    ],
    note: [
      "增量包用于在权益配额用尽后补充 Token。",
      "升、降档不影响未消耗的增量包。",
      "扣减顺序：企业权益（含企业增量包）→ 个人权益 → 个人增量包。"

const checkSvg = `<svg class="check-icon" viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="7" fill="currentColor"></circle><path d="M4.7 8.2 7 10.4l4.4-5" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>`;

function parsePrice(value) {
  const match = String(value).match(/^([\d,.]+(?:万|亿)?)\s*(.*)$/);
  if (!match) return { main: value, unit: "" };
  return { main: match[1], unit: match[2] };
}

function benefitText(label, value) {
  if (value === true) return label;
  if (value === false) return "";
  return `${label}：${value}`;
}

function formatTeacherNote(text) {
  return String(text)
    .replace("班级管理", "<strong>班级管理</strong>")
    .replace("智能体使用", "<strong>智能体使用</strong>");
}

function renderPlans(section) {
  const { tiers, rows } = BENEFITS_CONFIG[section];
  const quotaRow = rows.find(row => row.type === "quota");
  const toolRow = rows.find(row => row.type === "benefit" && row.label === "付费工具使用次数");
  const benefitRows = rows.filter(row => row.type === "benefit" && row !== toolRow);
  const grid = document.getElementById(`${section === "personal" ? "pers" : "corp"}-grid`);
  grid.style.setProperty("--columns", tiers.length);

  grid.innerHTML = tiers.map(tier => {
    const price = parsePrice(tier.price);
    const benefits = benefitRows
      .filter(row => row.label !== "teacherNote")
      .map(row => benefitText(row.label, row.values[tier.key]))
      .filter(Boolean);
    const teacherNoteRow = benefitRows.find(row => row.label === "teacherNote");
    const teacherNote = teacherNoteRow?.values[tier.key] || "";
    const quotaValue = quotaRow.values[tier.key];
    const quotaText = quotaValue;

    return `<article class="plan-card${tier.highlight ? " highlight" : ""}">
      <h2 class="plan-name">${tier.name}</h2>
      <span class="plan-tag">${tier.tag}</span>
      <div class="price-block">
        <div class="price-line"><span class="price-main">¥${price.main}</span><span class="price-unit">${price.unit}</span></div>
        <div class="price-desc"></div>
      </div>
      <div class="quota">
        <div class="quota-heading">扣减额度</div>
        <div class="quota-row"><span class="quota-label">${quotaRow.label}</span><span class="quota-value">${quotaText}</span></div>
        <div class="quota-row"><span class="quota-label">${toolRow.label}</span><span class="quota-value">${toolRow.values[tier.key]}</span></div>
        <div class="quota-note">使用相关功能时，将从对应权益额度中扣减。</div>
      </div>
      ${tier.action ? `<button class="plan-action" type="button" data-tip="功能开发中，敬请期待" ${tier.disabled ? "disabled" : ""}>${tier.action}</button>` : `<div class="plan-action-placeholder" aria-hidden="true"></div>`}
      <div class="benefit-heading">功能权益</div>
      <ul class="benefit-list">
        ${benefits.map(text => `<li class="benefit-item">${checkSvg}<span>${text}</span></li>`).join("")}
        ${teacherNote ? `<li class="benefit-item teacher-note-item">${checkSvg}<span>${formatTeacherNote(teacherNote)}</span></li>` : ""}
      </ul>
    </article>`;
  }).join("");
}

function renderAddons() {
  const { packages, note } = BENEFITS_CONFIG.addon;
  const grid = document.getElementById("addon-grid");
  grid.innerHTML = packages.map(pkg => {
    const price = parsePrice(pkg.price);
    return `<article class="plan-card addon-card">
      <h2 class="plan-name">${pkg.name}</h2>
      <span class="plan-tag">${pkg.tag}</span>
      <div class="price-block">
        <div class="price-line"><span class="price-main">¥${price.main}</span><span class="price-unit">${price.unit}</span></div>
        <div class="price-desc">${pkg.desc}</div>
      </div>
      <div class="quota"><div class="quota-row"><span class="quota-label">补充额度</span><span class="quota-value">${pkg.quota}</span></div></div>
      <button class="plan-action" type="button" data-tip="功能开发中，敬请期待">${pkg.action}</button>
      <div class="benefit-heading">增量包说明</div>
      <ul class="benefit-list">${pkg.benefits.map(text => `<li class="benefit-item">${checkSvg}<span>${text}</span></li>`).join("")}</ul>
    </article>`;
  }).join("");
  const noteLines = Array.isArray(note) ? note : [note];
  document.getElementById("addon-note").innerHTML =
    `<svg class="note-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"></circle><path d="M12 7.5v5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><circle cx="12" cy="16.4" r="1.05" fill="currentColor"></circle></svg>` +
    `<div class="note-body"><span class="note-title">使用说明</span>` +
    noteLines.map(line => `<span class="note-line">${line}</span>`).join("") +
    `</div>`;
}

function switchPane(pane) {
  document.querySelectorAll(".plan-tab").forEach(tab => {
    const active = tab.dataset.pane === pane;
    tab.classList.toggle("active", active);
    tab.setAttribute("aria-selected", String(active));
  });
  document.querySelectorAll(".plan-pane").forEach(panel => panel.classList.remove("active"));
  document.getElementById(`pane-${pane}`)?.classList.add("active");
  history.replaceState(null, "", `#${pane}`);
}

document.addEventListener("DOMContentLoaded", () => {
  renderPlans("personal");
  renderPlans("corporate");
  renderAddons();

  document.querySelectorAll(".plan-tab").forEach(tab => {
    tab.setAttribute("role", "tab");
    tab.addEventListener("click", () => switchPane(tab.dataset.pane));
  });

  const hash = location.hash.replace("#", "");
  if (["pers", "corp", "addon"].includes(hash)) switchPane(hash);
});
</script>
