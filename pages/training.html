<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>实训课程 · 初发 Trufar</title>
<link rel="stylesheet" href="../assets/shared.css">
<style>
.training-hero{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);color:#fff;padding:24px 28px;border-radius:14px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden}
.training-hero::after{content:'';position:absolute;right:-40px;top:-40px;width:240px;height:240px;background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%)}
.training-hero h2{font-size:22px;font-weight:700;position:relative;z-index:1}
.training-hero .desc{font-size:13px;opacity:.85;margin-top:6px;position:relative;z-index:1}
.training-hero .stats{display:flex;gap:24px;position:relative;z-index:1}
.training-hero .stat{text-align:right}
.training-hero .stat .v{font-size:24px;font-weight:700}
.training-hero .stat .l{font-size:11px;opacity:.85;margin-top:2px}

.course-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.course-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:all .2s;position:relative}
.course-card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.1)}
.course-cover{height:120px;display:flex;align-items:center;justify-content:center;font-size:42px;position:relative;overflow:hidden}
.course-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.3))}
.course-cover .cover-info{position:absolute;left:14px;bottom:10px;color:#fff;z-index:1;font-size:11px;font-weight:500;display:flex;align-items:center;gap:6px}
.course-body{padding:14px 16px}
.course-name{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.course-teacher{font-size:11px;color:var(--text-mute);display:flex;align-items:center;gap:4px}
.course-meta{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px dashed #f1f5f9;font-size:11px;color:#475569}
.course-progress{margin-top:10px}
.course-progress .pg-text{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:4px}
.course-progress .pg-bar{height:5px;background:#f1f5f9;border-radius:3px;overflow:hidden}
.course-progress .pg-fill{height:100%;background:linear-gradient(90deg,#10b981,#22c55e);border-radius:3px}
.course-tag-row{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}

.course-status{position:absolute;top:10px;left:10px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;backdrop-filter:blur(4px)}
.course-status.ongoing{background:rgba(16,185,129,.85);color:#fff}
.course-status.notstart{background:rgba(245,158,11,.85);color:#fff}
.course-status.done{background:rgba(100,116,139,.85);color:#fff}

.empty-add{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 14px;border:2px dashed #cbd5e1;border-radius:12px;background:#fafbfc;color:var(--text-mute);cursor:pointer;transition:all .15s;text-align:center;height:100%;min-height:280px}
.empty-add:hover{border-color:var(--accent);color:var(--accent);background:#eff6ff}
.empty-add .ico{font-size:36px;margin-bottom:10px}

/* 课程详情侧拉抽屉 */
.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;display:none;animation:fadeIn .2s}
.drawer-overlay.open{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:540px;background:#fff;box-shadow:-8px 0 24px rgba(0,0,0,.1);transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
.drawer-overlay.open .drawer{transform:translateX(0)}
.drawer-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.drawer-head h3{font-size:16px;font-weight:600;color:var(--primary)}
.drawer-body{flex:1;overflow-y:auto;padding:20px 24px}
.drawer-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

.drawer-banner{height:120px;border-radius:10px;display:flex;align-items:flex-end;padding:18px;color:#fff;font-size:18px;font-weight:700;margin-bottom:18px;background:linear-gradient(135deg,#2563eb,#1e3a8a);position:relative;overflow:hidden}
.drawer-banner::after{content:'📘';position:absolute;right:-10px;bottom:-20px;font-size:120px;opacity:.18}

.detail-row{display:grid;grid-template-columns:90px 1fr;gap:10px;padding:9px 0;font-size:13px;border-bottom:1px dashed #f1f5f9}
.detail-row:last-child{border:0}
.detail-row .l{color:var(--text-mute)}
.detail-row .v{color:var(--primary);font-weight:500}

.agent-row{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid #f1f5f9;border-radius:6px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.agent-row:hover{background:#eff6ff;border-color:#bfdbfe}
.agent-row .ico{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;flex-shrink:0}
.agent-row .info{flex:1;min-width:0}
.agent-row .info .nm{font-size:13px;font-weight:500;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-row .info .meta{font-size:11px;color:var(--text-mute);margin-top:2px}
</style>
</head>
<body>

<aside id="sidebar"></aside>
<main id="main">
  <header id="topbar"></header>
  <div id="content">

    <div class="training-hero">
      <div>
        <h2>📚 实训课程</h2>
        <div class="desc">智能体开发实训 · 16课时 · 视频+讲义</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="v">5</div><div class="l">课程模块</div></div>
        <div class="stat"><div class="v">14</div><div class="l">总课节</div></div>
        <div class="stat"><div class="v">35%</div><div class="l">学习进度</div></div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-item"><label>阶段</label>
        <select class="form-control"><option>全部</option><option>基础理论</option><option>入门</option><option>进阶</option><option>高阶</option><option>实训分享</option></select>
      </div>
      <div class="filter-item"><label>状态</label>
        <select class="form-control"><option>全部</option><option>进行中</option><option>未开始</option><option>已完成</option></select>
      </div>
      <div class="filter-item"><label>课程</label>
        <input class="form-control" placeholder="搜索课程名称">
      </div>
    </div>

    <div class="course-grid" id="course-grid"></div>

  </div>
</main>

<!-- 课程详情侧拉 -->
<div class="drawer-overlay" id="drawer">
  <div class="drawer">
    <div class="drawer-head">
      <h3 id="drawer-title">课程详情</h3>
      <button class="modal-close" onclick="closeDrawer()">×</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-foot">
      <button class="btn btn-outline" onclick="closeDrawer()">关闭</button>
      <button class="btn btn-primary" onclick="window.location.href='training-detail.html'">进入学习 →</button>
    </div>
  </div>
</div>

<script>
const PAGE_CONFIG = { activeNav:'training', title:'课程中心', breadcrumb:['实训课程','课程中心'], breadcrumbLinks:['',''] };
</script>
<script src="../assets/shared.js"></script>
<script>
const COURSES = [
  { name:'WorkBuddy基础培训', stage:'入门', lessons:6, hours:'8课时',
    color:'linear-gradient(135deg,#2563eb,#0f766e)', emoji:'🧩', status:'notstart',
    progress:0,
    desc:'从 WorkBuddy 工作区、项目目录和任务指令开始，逐步掌握 Skills 安装、MCP 工具连接与综合实训提交。',
    teacher:'平台官方',
    resources:['WorkBuddy界面与账号登录','项目空间与C-D盘规范','Skills安装与调用指南','MCP工具连接配置','综合实训验收规范']
  },
];

const STATUS_TEXT = { ongoing:'进行中', notstart:'未开始', done:'已完成' };

const OFFICIAL_COURSE_DATA_URL = '../workbuddy-course-data.json';
const OFFICIAL_COURSE_FALLBACK = {
  course: {
    code: 'WB-BASIC-101',
    name: 'WorkBuddy基础培训',
    official: true,
    publisher: '平台官方',
    description: '从 WorkBuddy 工作区、项目目录和任务指令开始，逐步掌握 Skills 安装、MCP 工具连接与综合实训提交。',
    totalHours: 8,
  },
  lessons: [],
  resources: [],
  structure: [],
  additionalCourses: [{
    code: 'WB-PPT-101', name: 'WorkBuddy PPT编写实训', official: true, publisher: '平台官方',
    description: '使用 WorkBuddy 完成 PPT 需求分析、大纲编写、逐页生成、视觉优化、导出与验收。', totalHours: 10,
    lessons: [{name:'01_PPT需求分析与受众定位.pdf'},{name:'02_PPT大纲与叙事结构.mp4'},{name:'03_逐页文案与素材提示词.pdf'},{name:'04_PPT视觉规范与版式设计.mp4'},{name:'05_PPT导出与验收清单.pdf'}],
    resources: [{name:'ppt-outline-builder.skill.zip'},{name:'slide-quality-checker.skill.zip'},{name:'presentation-tools.mcp.json'},{name:'PPT需求brief模板.docx'},{name:'PPT视觉规范模板.pptx'},{name:'演示文稿验收清单.xlsx'},{name:'PPT演示示例素材包.zip'}]
  }]
};

function countOfficialTasks(structure=[]){
  return structure.reduce((chapterTotal,chapter)=>chapterTotal+(chapter.sections||[]).reduce((sectionTotal,section)=>sectionTotal+(section.tasks||[]).length,0)+(chapter.tasks||[]).length,0);
}

function mapCourseRecordToCenter(meta,lessons=[],resources=[],structure=[],options={}){
  return {
    code:meta.code||'WB-BASIC-101', name:meta.name||meta.course||'WorkBuddy基础培训',
    stage:options.stage||'官方实训', lessons:lessons.length, hours:`${meta.totalHours||0}课时`,
    color:options.color||'linear-gradient(135deg,#0f766e,#155e75)', emoji:options.emoji||'🧠', status:'notstart', progress:0,
    desc:meta.description||'', teacher:meta.publisher||'平台官方',
    resources:[...lessons.map(item=>item.name),...resources.map(item=>item.name)],
    taskCount:options.taskCount||countOfficialTasks(structure), outcomes:meta.outcomes||[], official:true,
    officialData:{course:meta,lessons,resources,structure}
  };
}
function mapOfficialCourseToCenter(data){
  const meta=data.course||{};
  return mapCourseRecordToCenter(meta,Array.isArray(data.lessons)?data.lessons:[],Array.isArray(data.resources)?data.resources:[],data.structure||{});
}

function publishedTypes(item){const types=Array.isArray(item?.publishTypes)?item.publishTypes:((item?.publishType==='official'||item?.publishType==='public')?[item.publishType]:[]);return types.filter(type=>type==='official'||type==='public');}
function loadAdminPublishedOfficialCourses(){
  try{
    const records=JSON.parse(localStorage.getItem('training-course-publications')||'[]');
    if(!Array.isArray(records))return [];
    return records.filter(item=>publishedTypes(item).includes('official')).map(item=>({
      code:item.displayCode?.startsWith('OFF-')?item.displayCode:`OFF-${item.sourceCode}`,name:item.name,stage:'官方实训',
      lessons:Number(item.sections||item.lessons)||0,hours:`${Number(item.hours)||0}课时`,
      color:'linear-gradient(135deg,#2563eb,#0f766e)',emoji:'🏅',status:'notstart',progress:0,
      desc:item.desc||'',teacher:item.publisher||'系统管理员',resources:[],
      taskCount:Number(item.tasks)||0,official:true,adminPublished:true
    }));
  }catch{return [];}
}

async function loadOfficialCourse(){
  let data=OFFICIAL_COURSE_FALLBACK;
  try{
    const response=await fetch(OFFICIAL_COURSE_DATA_URL,{cache:'no-store'});
    if(!response.ok)throw new Error(`HTTP ${response.status}`);
    const fetched=await response.json();
    if(!fetched.course?.official)throw new Error('课程未标记为官方实训课程');
    data=fetched;
  }catch(error){
    console.warn('官方实训课程数据加载失败，使用内置摘要：',error);
  }
  const course=mapOfficialCourseToCenter(data);
  const existingIndex=COURSES.findIndex(item=>item.code===course.code);
  if(existingIndex>=0)COURSES.splice(existingIndex,1);
  COURSES.unshift(course);
  (Array.isArray(data.additionalCourses)?data.additionalCourses:[]).map(item=>mapCourseRecordToCenter(item,item.lessons||[],item.resources||[],item.structure||[],{color:'linear-gradient(135deg,#7c3aed,#2563eb)',emoji:'📊',taskCount:6})).reverse().forEach(item=>{
    const index=COURSES.findIndex(courseItem=>courseItem.code===item.code);
    if(index>=0)COURSES.splice(index,1);
    COURSES.unshift(item);
  });
  loadAdminPublishedOfficialCourses().reverse().forEach(item=>{
    const index=COURSES.findIndex(courseItem=>courseItem.code===item.code);
    if(index>=0)COURSES.splice(index,1);
    COURSES.unshift(item);
  });
  renderCourses();
}

function renderCourses(){
  const grid = document.getElementById('course-grid');
  let html = COURSES.map((c,i) => `
    <div class="course-card" onclick="openDrawer(${i})">
      <div class="course-cover" style="background:${c.color}">
        <span style="position:relative;z-index:1">${c.emoji}</span>
        <span class="course-status ${c.status}">${STATUS_TEXT[c.status]}</span>
        <span class="cover-info">${c.lessons} 课节 · ${c.hours}</span>
      </div>
      <div class="course-body">
        <div class="course-name">${c.name}</div>
        <div class="course-teacher">👨‍🏫 ${c.teacher} · ${c.stage}</div>
        <div class="course-tag-row">
          <span class="badge badge-blue">${c.lessons} 课节</span>
          <span class="badge badge-purple">${c.hours}</span>
          ${c.official?'<span class="badge badge-green">官方实训课程</span>':''}
        </div>
        <div class="course-progress">
          <div class="pg-text"><span>学习进度</span><b>${c.progress}%</b></div>
          <div class="pg-bar"><div class="pg-fill" style="width:${c.progress}%"></div></div>
        </div>
      </div>
    </div>
  `).join('');
  grid.innerHTML = html;
}

function openDrawer(i){
  const c = COURSES[i];
  document.getElementById('drawer-title').textContent = c.name;
  const resHtml = (c.resources || []).map(r => `
    <div class="agent-row">
      <div class="ico" style="background:#2563eb">📄</div>
      <div class="info"><div class="nm">${r}</div><div class="meta">教学资源</div></div>
      <button class="btn btn-sm btn-link">查看 →</button>
    </div>
  `).join('') || '<div style="color:var(--text-mute);font-size:12px">暂无关联资源</div>';

  document.getElementById('drawer-body').innerHTML = `
    <div class="drawer-banner" style="background:${c.color}">
      ${c.name}
    </div>

    <div class="detail-row"><span class="l">课程阶段</span><span class="v">${c.stage}</span></div>
    ${c.official?`<div class="detail-row"><span class="l">课程来源</span><span class="v">${c.teacher}</span></div>`:''}
    <div class="detail-row"><span class="l">课节数量</span><span class="v">${c.lessons} 课节</span></div>
    ${c.taskCount?`<div class="detail-row"><span class="l">实训任务</span><span class="v">${c.taskCount} 个任务</span></div>`:''}
    <div class="detail-row"><span class="l">建议课时</span><span class="v">${c.hours}</span></div>
    <div class="detail-row"><span class="l">授课教师</span><span class="v">${c.teacher}</span></div>
    <div class="detail-row"><span class="l">当前状态</span><span class="v">${STATUS_TEXT[c.status]}</span></div>
    <div class="detail-row"><span class="l">学习进度</span><span class="v">${c.progress}%</span></div>

    <h4 style="margin:18px 0 8px;font-size:13px;color:var(--primary)">📝 课程介绍</h4>
    <div style="font-size:13px;color:#475569;line-height:1.7">${c.desc}</div>

    ${c.outcomes?.length?`<h4 style="margin:18px 0 8px;font-size:13px;color:var(--primary)">🎯 学习目标</h4><ul style="margin:0;padding-left:20px;color:#475569;font-size:12px;line-height:1.8">${c.outcomes.map(item=>`<li>${item}</li>`).join('')}</ul>`:''}

    <h4 style="margin:18px 0 8px;font-size:13px;color:var(--primary)">📚 教学资源（${c.resources.length}）</h4>
    ${resHtml}
  `;
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); }

loadOfficialCourse();
</script>
</body>
</html>
