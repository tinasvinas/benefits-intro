/* 权益页专属样式 */

.btn-outline{background:#fff;border:1px solid #cbd5e1;color:#475569}.btn-outline:hover{border-color:#2563eb;color:#2563eb}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;color:#64748b;font-weight:600;padding:10px 12px;text-align:left;border-bottom:2px solid #e2e8f0}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#334155}
tr:hover td{background:#f8fafc}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-green{background:#d1fae5;color:#065f46}
.badge-purple{background:#ede9fe;color:#6d28d9}

.badge-gray{background:#f1f5f9;color:#475569}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:480px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:15px;font-weight:600;color:#1e3a5f}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;line-height:1}.modal-close:hover{color:#475569}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:10px}

.toast{padding:12px 18px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;animation:slideIn .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.15);min-width:240px}
.toast.success{background:#10b981}.toast.error{background:#ef4444}.toast.info{background:#3b82f6}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.log-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f1f5f9}

.log-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}

// ===== FORMATTERS =====
// 卡片内的小型用量进度条（带标签）
function usageBar(label, used, limit){
  const u=used||0;
  if(limit===0||limit===false||limit==='0'||limit===undefined||limit===null){
    return `<div style="margin-top:6px"><div style="font-size:11px;color:#94a3b8">${label}：<span style="color:#cbd5e1">不支持</span></div></div>`;
  }
  if(limit==='无限制'){
    return `<div style="margin-top:6px"><div style="height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden"><div style="width:6%;height:100%;background:#10b981;border-radius:2px"></div></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">${label} ${u.toLocaleString()} / 无限制</div></div>`;
  }
  const l=typeof limit==='number'?limit:0;
  const pct=l?Math.min(100,Math.round(u/l*100)):0;
  const color=pct>=90?'#ef4444':pct>=70?'#f59e0b':'#2563eb';
  return `<div style="margin-top:6px"><div style="height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${color};border-radius:2px"></div></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">${label} ${u.toLocaleString()} / ${l.toLocaleString()} 次</div></div>`;
}
function fmtVal(v){
  if(v===false||v===0||v==='0')return '<span style="color:#ef4444">❌ 不支持</span>';
  if(v===true)return '<span style="color:#10b981">✅ 支持</span>';
  if(v==='无限制')return '<span style="color:#10b981">✅ 无限制</span>';
  if(typeof v==='number')return '<span style="color:#10b981">✅ '+v.toLocaleString()+'</span>';
  return '<span style="color:#10b981">✅ '+v+'</span>';
}
function fmtUsage(used,limit){
  if(limit===false||limit===0||limit==='0') return '<span style="color:#ef4444">❌ 不支持</span>';
  if(limit===true) return '<span style="color:#10b981">✅ 支持</span>';
  if(limit==='无限制') return `<span style="color:#64748b">${(used||0).toLocaleString()} 已用</span> <span style="color:#94a3b8">/ 无限制</span>`;
  const u=used||0, l=typeof limit==='number'?limit:0;
  if(l===0) return '<span style="color:#ef4444">❌ 不支持</span>';
  const pct=Math.min(100,Math.round(u/l*100));
  const color=pct>=90?'#ef4444':pct>=70?'#f59e0b':'#2563eb';
  return `<div style="display:flex;align-items:center;gap:8px">
    <div style="flex:1;min-width:80px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:3px"></div>
    </div>
    <span style="font-size:12px;color:#475569;white-space:nowrap">${u.toLocaleString()} / ${l.toLocaleString()}</span>
    <span style="font-size:11px;color:${color};font-weight:600">${pct}%</span>
  </div>`;
}
function parseStorageMB(s){
  if(!s||s==='0') return 0;
  const m=String(s).match(/^([\d.]+)\s*(MB|GB|TB)?$/i);
  if(!m) return 0;
  const n=parseFloat(m[1]), unit=(m[2]||'MB').toUpperCase();
  return unit==='GB'?n*1024:unit==='TB'?n*1024*1024:n;
}
function fmtStorageUsage(usedMB, limitStr){
  if(!limitStr||limitStr==='0') return '<span style="color:#ef4444">❌ 不支持</span>';
  if(limitStr==='无限制') return `<span style="color:#64748b">${usedMB||0} MB 已用</span> <span style="color:#94a3b8">/ 无限制</span>`;
  const l=parseStorageMB(limitStr), u=usedMB||0;
  if(l===0) return '<span style="color:#ef4444">❌ 不支持</span>';
  const pct=Math.min(100,Math.round(u/l*100));
  const color=pct>=90?'#ef4444':pct>=70?'#f59e0b':'#2563eb';
  const fmt=v=>v>=1024?(v/1024).toFixed(1)+'GB':v+'MB';
  return `<div style="display:flex;align-items:center;gap:8px">
    <div style="flex:1;min-width:80px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:3px"></div>
    </div>
    <span style="font-size:12px;color:#475569;white-space:nowrap">${fmt(u)} / ${limitStr}</span>
    <span style="font-size:11px;color:${color};font-weight:600">${pct}%</span>
  </div>`;
}

function persDetailHTML(u){
  if(u.benefit==='none')return '<div style="color:#94a3b8;padding:24px;text-align:center;font-size:13px">暂无个人权益</div>';
  const now2=new Date().toISOString().slice(0,10);
  const expired=u.endDate&&u.endDate<now2;
  const statusBadge=expired?'<span class="badge badge-red">已过期</span>':'<span class="badge badge-green">生效</span>';
  return `<table style="width:100%;font-size:13px;border-collapse:collapse">
      <tbody>
        <tr style="background:#fff"><td style="padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#94a3b8;width:120px">权益类型</td><td style="padding:10px 12px;border-bottom:1px solid #f1f5f9"><span class="badge ${BADGE_MAP[u.benefit]||'badge-gray'}">${BENEFIT_LABELS[u.benefit]}</span></td></tr>
        <tr style="background:#f8fafc"><td style="padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#94a3b8">有效期</td><td style="padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#475569">${u.startDate||'-'} ~ ${u.endDate||'-'}</td></tr>
        <tr style="background:#fff"><td style="padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#94a3b8">Token 配额</td><td style="padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#475569">${(BENEFIT_TOKENS[u.benefit]||0).toLocaleString()}</td></tr>
        <tr style="background:#fff"><td style="padding:10px 12px;color:#94a3b8">状态</td><td style="padding:10px 12px">${statusBadge}</td></tr>
      </tbody>
    </table>`;
}
function addonDetailHTML(u){
  const school=schools.find(s=>s.name===u.school);
  const sTotal=school?school.addonTotal||0:0, sUsed=school?school.addonUsed||0:0;
  const pTotal=u.addonTotal||0, pUsed=u.addonUsed||0;
  if(sTotal<=0&&pTotal<=0)return '<div style="color:#94a3b8;padding:24px;text-align:center;font-size:13px">未购买增量包</div>';
  const block=(label,total,used)=>{
    if(total<=0)return `<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:600;color:#1e3a5f;margin-bottom:8px">${label}</div><div style="font-size:12px;color:#94a3b8;padding:10px 12px;background:#f8fafc;border-radius:6px">未购买</div></div>`;
    const remain=total-used;
    const pct=Math.min(100,Math.round(used/total*100));
    const c=pct>=90?'#ef4444':pct>=70?'#f59e0b':'#2563eb';
    return `<div style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;color:#1e3a5f;margin-bottom:8px">${label}</div>
      <table style="width:100%;font-size:13px;border-collapse:collapse">
        <tbody>
          <tr style="background:#fff"><td style="padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#94a3b8;width:120px">总额度</td><td style="padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#475569">${total.toLocaleString()} Token</td></tr>
          <tr style="background:#f8fafc"><td style="padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#94a3b8">已消耗</td><td style="padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#475569">${used.toLocaleString()} Token</td></tr>
          <tr style="background:#fff"><td style="padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#94a3b8">剩余</td><td style="padding:8px 12px;border-bottom:1px solid #f1f5f9;color:#10b981;font-weight:600">${remain.toLocaleString()} Token</td></tr>
          <tr style="background:#f8fafc"><td style="padding:8px 12px;color:#94a3b8">使用进度</td><td style="padding:8px 12px">
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${c};border-radius:3px"></div></div>
              <span style="font-size:12px;color:#475569">${pct}%</span>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>`;
  };
  return block('🏫 学校增量包',sTotal,sUsed)+block('👤 个人增量包',pTotal,pUsed);
}

function togglePaidTools(e){
  e.stopPropagation();
  const pop=document.getElementById('paid-tools-pop');
  const btn=e.currentTarget;
  if(pop.classList.contains('open')){pop.classList.remove('open');return;}
  pop.innerHTML=`
    <div class="pt-head"><span>付费工具（消耗工具使用次数）</span><button class="pt-close" onclick="document.getElementById('paid-tools-pop').classList.remove('open')">×</button></div>
    ${PAID_TOOLS.map(t=>`<div class="pt-item">
      <div class="pt-name"><span>${t.name}</span></div>
    </div>`).join('')}`;
  // 先显示以便测量尺寸
  pop.classList.add('open');
  const r=btn.getBoundingClientRect();
  const pw=pop.offsetWidth, ph=pop.offsetHeight;
  let left=r.left, top=r.bottom+6;
  if(left+pw>window.innerWidth-12) left=window.innerWidth-pw-12;
  if(top+ph>window.innerHeight-12) top=Math.max(12, r.top-ph-6);
  pop.style.left=left+'px';
  pop.style.top=top+'px';
}
document.addEventListener('click',e=>{
  const pop=document.getElementById('paid-tools-pop');
  if(pop&&pop.classList.contains('open')&&!pop.contains(e.target)) pop.classList.remove('open');
});
